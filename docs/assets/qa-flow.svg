<svg viewBox="0 0 780 850" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI','Microsoft YaHei',sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="780" height="850" fill="#ffffff"/>
  <text x="30" y="34" font-size="17" font-weight="700" fill="#1e293b">问答主流程 · 六道有序闸门</text>
  <text x="30" y="54" font-size="12" fill="#64748b">lib/rag/generateAnswer.ts — 每道闸门都可能提前拒答</text>

  <!-- vertical spine arrows -->
  <g stroke="#94a3b8" stroke-width="1.6" marker-end="url(#arr)" fill="none">
    <line x1="270" y1="120" x2="270" y2="160"/>
    <line x1="270" y1="210" x2="270" y2="250"/>
    <line x1="270" y1="300" x2="270" y2="340"/>
    <line x1="270" y1="390" x2="270" y2="430"/>
    <line x1="270" y1="480" x2="270" y2="520"/>
    <line x1="270" y1="570" x2="270" y2="610"/>
    <line x1="270" y1="660" x2="270" y2="700"/>
    <line x1="270" y1="750" x2="270" y2="790"/>
  </g>
  <!-- horizontal refusal branches -->
  <g stroke="#f59e0b" stroke-width="1.6" marker-end="url(#arr)" fill="none">
    <line x1="400" y1="184" x2="540" y2="184"/>
    <line x1="400" y1="364" x2="540" y2="364"/>
    <line x1="400" y1="454" x2="540" y2="454"/>
    <line x1="400" y1="634" x2="540" y2="634"/>
  </g>
  <g font-size="11" fill="#b45309" text-anchor="middle">
    <text x="470" y="178">超范围</text>
    <text x="470" y="358">是</text>
    <text x="470" y="448">不足</text>
    <text x="470" y="628">是</text>
  </g>

  <!-- spine nodes -->
  <g text-anchor="middle" font-size="13.5">
    <!-- start -->
    <rect x="140" y="72" width="260" height="48" rx="10" fill="#f1f5f9" stroke="#64748b" stroke-width="1.5"/>
    <text x="270" y="101" fill="#334155" font-weight="600">用户提问</text>
    <!-- D1 -->
    <rect x="140" y="160" width="260" height="48" rx="10" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="270" y="189" fill="#92400e" font-weight="600">① checkScope 范围判断</text>
    <!-- N2 -->
    <rect x="140" y="250" width="260" height="48" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
    <text x="270" y="279" fill="#3730a3" font-weight="600">② retrieve 三路检索 + 重排</text>
    <!-- D2 -->
    <rect x="140" y="340" width="260" height="48" rx="10" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="270" y="369" fill="#92400e" font-weight="600">③ 仅命中无权资料？</text>
    <!-- D3 -->
    <rect x="140" y="430" width="260" height="48" rx="10" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="270" y="459" fill="#92400e" font-weight="600">④ checkEvidence 依据充分？</text>
    <!-- N3 -->
    <rect x="140" y="520" width="260" height="48" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
    <text x="270" y="549" fill="#3730a3" font-weight="600">⑤ LLM 抽取式生成（Top-5）</text>
    <!-- D4 -->
    <rect x="140" y="610" width="260" height="48" rx="10" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="270" y="639" fill="#92400e" font-weight="600">⑥ LLM 自拒答？</text>
    <!-- N4 -->
    <rect x="140" y="700" width="260" height="48" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
    <text x="270" y="729" fill="#3730a3" font-weight="600">⑦ 表格装配 + 拼装</text>
    <!-- N5 success -->
    <rect x="140" y="790" width="260" height="48" rx="10" fill="#ecfdf5" stroke="#10b981" stroke-width="1.8"/>
    <text x="270" y="819" fill="#065f46" font-weight="700">✓ 结构化回答 + 引用卡片</text>
  </g>

  <!-- refusal nodes -->
  <g text-anchor="middle" font-size="12.5">
    <rect x="540" y="162" width="210" height="44" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
    <text x="645" y="189" fill="#b91c1c" font-weight="600">拒答 · 超出范围</text>
    <rect x="540" y="342" width="210" height="44" rx="10" fill="#fff7ed" stroke="#f97316" stroke-width="1.5"/>
    <text x="645" y="369" fill="#c2410c" font-weight="600">权限提示 · 不泄露原文</text>
    <rect x="540" y="432" width="210" height="44" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
    <text x="645" y="459" fill="#b91c1c" font-weight="600">拒答 · 依据不足</text>
    <rect x="540" y="612" width="210" height="44" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
    <text x="645" y="639" fill="#b91c1c" font-weight="600">拒答 · LLM 自判无依据</text>
  </g>

  <!-- legend -->
  <g font-size="11.5" fill="#475569">
    <rect x="140" y="20" width="13" height="13" rx="3" fill="#eef2ff" stroke="#6366f1"/>
    <text x="159" y="31">流程</text>
    <rect x="210" y="20" width="13" height="13" rx="3" fill="#fffbeb" stroke="#f59e0b"/>
    <text x="229" y="31">判断</text>
    <rect x="280" y="20" width="13" height="13" rx="3" fill="#fef2f2" stroke="#ef4444"/>
    <text x="299" y="31">拒答</text>
    <rect x="350" y="20" width="13" height="13" rx="3" fill="#ecfdf5" stroke="#10b981"/>
    <text x="369" y="31">完成</text>
  </g>
</svg>
