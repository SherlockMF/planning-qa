<svg viewBox="0 0 720 280" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI','Microsoft YaHei',sans-serif">
  <defs>
    <marker id="arr3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="720" height="280" fill="#ffffff"/>
  <text x="24" y="30" font-size="16" font-weight="700" fill="#1e293b">文档状态机 · DocumentStatus</text>

  <!-- arrows -->
  <g stroke="#94a3b8" stroke-width="1.6" fill="none" marker-end="url(#arr3)">
    <line x1="40" y1="120" x2="70" y2="120"/>
    <line x1="186" y1="120" x2="244" y2="120"/>
    <line x1="390" y1="108" x2="456" y2="86"/>
    <line x1="390" y1="132" x2="456" y2="170"/>
  </g>
  <!-- retry curved arrow failed -> processing -->
  <path d="M456,198 C360,240 300,210 300,150" stroke="#94a3b8" stroke-width="1.6" fill="none" marker-end="url(#arr3)" stroke-dasharray="5 4"/>

  <g font-size="11" fill="#64748b">
    <text x="200" y="112" text-anchor="middle">触发 process</text>
    <text x="430" y="86" text-anchor="middle" fill="#059669">成功</text>
    <text x="430" y="166" text-anchor="middle" fill="#b91c1c">失败</text>
    <text x="360" y="232" text-anchor="middle">重试</text>
  </g>

  <!-- start dot -->
  <circle cx="30" cy="120" r="6" fill="#334155"/>

  <g text-anchor="middle" font-size="13">
    <rect x="70" y="98" width="116" height="44" rx="9" fill="#f1f5f9" stroke="#64748b" stroke-width="1.4"/>
    <text x="128" y="125" fill="#334155" font-weight="600">pending</text>

    <rect x="244" y="98" width="146" height="44" rx="9" fill="#eef2ff" stroke="#6366f1" stroke-width="1.4"/>
    <text x="317" y="125" fill="#3730a3" font-weight="600">processing</text>

    <rect x="456" y="62" width="146" height="44" rx="9" fill="#ecfdf5" stroke="#10b981" stroke-width="1.8"/>
    <text x="529" y="89" fill="#065f46" font-weight="700">indexed</text>

    <rect x="456" y="156" width="146" height="44" rx="9" fill="#fef2f2" stroke="#ef4444" stroke-width="1.4"/>
    <text x="529" y="183" fill="#b91c1c" font-weight="600">failed</text>
  </g>

  <rect x="24" y="240" width="672" height="30" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1.2"/>
  <text x="40" y="259" font-size="12" fill="#065f46">仅 status = indexed 且 enabled = true 的文档才会进入检索（canAccessDocument）。</text>
</svg>
